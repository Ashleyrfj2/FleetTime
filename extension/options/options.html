<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>FleetTime Tracker — Settings</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 420px;
        margin: 32px auto;
        color: #1c1c1e;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin: 12px 0 4px;
      }
      input {
        width: 100%;
        padding: 6px 8px;
        font-size: 13px;
        box-sizing: border-box;
      }
      button {
        margin-top: 16px;
        padding: 8px 16px;
        font-weight: 600;
        cursor: pointer;
      }
      #status {
        margin-top: 12px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h2>Connect to FleetTime</h2>
    <p>Paste the port and token shown in the FleetTime app's Settings panel.</p>
    <label for="port">Port</label>
    <input id="port" type="number" placeholder="47850" />
    <label for="token">Token</label>
    <input id="token" type="text" placeholder="paired token" />
    <button id="save">Save</button>
    <div id="status"></div>
    <script src="options.js"></script>
  </body>
</html>
